<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tabula Handoff Dev Harness</title>
  </head>
  <body>
    <main class="handoff-card" aria-label="Tabula handoff">
      <div class="handoff-row">
        <header class="handoff-brand" aria-label="Tabula">
          <img id="tabulaMark" class="handoff-mark" alt="" />
          <span>Tabula</span>
        </header>

        <div class="handoff-details">
          <span id="handoffEyebrow" class="handoff-eyebrow">Preparing handoff</span>
          <span id="handoffMeta" class="handoff-meta">Waiting for workspace</span>
          <span id="message" class="message" role="status" aria-live="polite"></span>
        </div>

        <button id="openButton" class="handoff-action" type="button" hidden>Open</button>
      </div>
    </main>

    <script type="module" src="/src/app-dev/main.js"></script>
  </body>
</html>
