<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tabula Handoff Dev Harness</title>
  </head>
  <body>
    <main class="handoff-card" aria-label="Tabula handoff">
      <header class="handoff-header" aria-label="Tabula">
        <img id="tabulaMark" class="handoff-mark" alt="" />
        <span>Tabula</span>
      </header>

      <section class="handoff-body">
        <p id="handoffEyebrow" class="handoff-eyebrow">Preparing handoff</p>
        <p id="handoffSummary" class="handoff-summary">Tabula is preparing a secure handoff.</p>
        <p id="handoffMeta" class="handoff-meta">Waiting for workspace</p>
        <button id="openButton" class="handoff-action" type="button" hidden>Open</button>
      </section>

      <p id="message" class="message" role="status" aria-live="polite"></p>
    </main>

    <script type="module" src="/src/app-dev/main.js"></script>
  </body>
</html>
