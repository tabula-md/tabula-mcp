<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tabula.md Session Dev Harness</title>
  </head>
  <body>
    <main class="session-card" aria-labelledby="sessionTitle">
      <header class="session-card-header">
        <img id="tabulaMark" class="session-card-mark" alt="" />
        <span>Tabula.md</span>
      </header>

      <section class="session-card-body">
        <p id="sessionEyebrow" class="session-eyebrow">Preparing session</p>
        <h1 id="sessionTitle">Untitled document</h1>
        <p id="sessionSummary" class="session-summary">Tabula.md is preparing a collaboration handoff.</p>

        <dl class="session-details">
          <div>
            <dt>Document</dt>
            <dd id="documentMeta">Waiting for content</dd>
          </div>
          <div>
            <dt>Collaboration</dt>
            <dd id="collaborationMeta">Not shared</dd>
          </div>
        </dl>

        <div class="session-actions">
          <button id="openCopyButton" class="session-action" type="button" hidden>Open a copy</button>
          <button id="startSessionButton" class="session-action session-action-primary" type="button" hidden>Start session</button>
          <button id="openSessionButton" class="session-action session-action-primary" type="button" hidden>Open session</button>
        </div>
      </section>

      <p id="message" class="message" role="status" aria-live="polite"></p>
    </main>

    <script type="module" src="/src/app-dev/main.js"></script>
  </body>
</html>
