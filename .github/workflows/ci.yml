name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-20-compatibility:
    name: Node 20 Compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify supported runtime
        run: npm run typecheck && npm test && npm run test:stdio && npm run check:pack

  release-verify:
    name: Release Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm

      - name: Setup Java for Firebase emulators
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Load pinned interoperability revisions
        id: manifest
        run: node scripts/export-release-manifest.mjs

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify release gate
        run: npm run release:verify

      - name: Checkout Tabula browser dependencies
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.manifest.outputs.tabula_md_repository }}
          ref: ${{ steps.manifest.outputs.tabula_md_ref }}
          path: deps/tabula-md

      - name: Checkout Room service
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.manifest.outputs.tabula_room_repository }}
          ref: ${{ steps.manifest.outputs.tabula_room_ref }}
          path: deps/tabula-room

      - name: Checkout Copy service
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.manifest.outputs.tabula_json_repository }}
          ref: ${{ steps.manifest.outputs.tabula_json_ref }}
          path: deps/tabula-json

      - name: Verify pinned interoperability commits
        run: node scripts/check-interoperability-checkouts.mjs

      - name: Install interoperability dependencies
        run: npm ci --prefix deps/tabula-md && npm ci --prefix deps/tabula-room && npm ci --prefix deps/tabula-json

      - name: Verify live collaboration and Copy browser round trips
        env:
          TABULA_MD_REPO_DIR: ${{ github.workspace }}/deps/tabula-md
          TABULA_ROOM_REPO_DIR: ${{ github.workspace }}/deps/tabula-room
          TABULA_JSON_REPO_DIR: ${{ github.workspace }}/deps/tabula-json
        run: npm run test:e2e:local-collab
